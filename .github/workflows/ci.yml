name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      # Pin by full commit SHA (supply-chain hardening). Tags in comments for humans.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Version coherence
        run: npm run check:version

      - name: Build (Next.js shell)
        run: npm run build

      - name: Test
        run: npm test

      - name: Dependency audit (report only, doesn't block merge)
        run: npm audit --audit-level=high || true

  docker-smoke:
    runs-on: ubuntu-latest
    needs: build-and-test
    # Single Node matrix is enough for the image smoke; keep permissions tight.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Docker smoke (build + /api/health)
        run: npm run docker:smoke
