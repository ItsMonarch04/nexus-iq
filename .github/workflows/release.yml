name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm run check:version
      - run: npm run build
      - run: npm test
      - name: Publish GitHub Release from README Changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          BODY=$(node -e "
            const fs=require('fs');
            const md=fs.readFileSync('README.md','utf8');
            const re=new RegExp('### v'+${JSON.stringify(VER.replace(/\./g,'\\.'))}+'\\n([\\s\\S]*?)(?=\\n### |$)');
            const m=md.match(re);
            process.stdout.write(m ? m[1].trim() : 'See README.md Changelog');
          ")
          gh release create "$TAG" --title "$TAG" --notes "$BODY"
